name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-engine -> target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            python-service/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-service/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run full verification
        run: ./scripts/check_all.sh

      - name: Validate generated OpenAPI and TypeScript drift
        run: |
          git diff --exit-code -- \
            frontend/src/generated/openapi.json \
            frontend/src/generated/openapi.ts

  integration-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-engine -> target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            python-service/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-service/requirements-dev.txt

      - name: Run managed integration smoke
        run: scripts/run_integration_smoke.sh

  nim-advisory-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
      ENABLE_NIM_ADVISORY: "true"
      NIM_MODEL: deepseek-ai/deepseek-v3.2
      NIM_MAX_REQUESTS_PER_RUN: "1"
      NIM_MAX_EVIDENCE_PER_RUN: "1"
      NIM_MAX_TOKENS_PER_RUN: "2000"
      NIM_MAX_LATENCY_MS_PER_RUN: "60000"

    steps:
      - uses: actions/checkout@v4

      - name: Skip when NVIDIA secret is absent
        if: env.NVIDIA_NIM_API_KEY == ''
        run: echo "NVIDIA_NIM_API_KEY is not configured; skipping NIM advisory smoke."

      - name: Set up Python
        if: env.NVIDIA_NIM_API_KEY != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            python-service/requirements-dev.txt

      - name: Install Python dependencies
        if: env.NVIDIA_NIM_API_KEY != ''
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-service/requirements-dev.txt

      - name: Run NIM advisory smoke
        if: env.NVIDIA_NIM_API_KEY != ''
        run: PYTHONPATH=python-service scripts/run_nim_advisory_smoke.py
